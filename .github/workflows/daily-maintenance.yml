name: Daily Maintenance Report

on:
  schedule:
    # Five windows spread across UTC day; 2–5 run per day (see activity_bot.py).
    - cron: "15 3 * * *"
    - cron: "40 7 * * *"
    - cron: "20 11 * * *"
    - cron: "55 15 * * *"
    - cron: "10 20 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Force a commit (ignore daily slot selection)"
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  daily-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run activity bot
        env:
          GITHUB_EVENT_SCHEDULE: ${{ github.event.schedule }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ inputs.force }}" = "true" ]; then
            python scripts/activity_bot.py --force
          else
            python scripts/activity_bot.py
          fi
