name: Daily Maintenance Report

on:
  schedule:
    # Five windows spread across UTC day; 2–5 run per day (see activity_bot.py).
    - cron: "15 3 * * *"
    - cron: "40 7 * * *"
    - cron: "20 11 * * *"
    - cron: "55 15 * * *"
    - cron: "10 20 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Force a commit (ignore daily slot selection)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  daily-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Run activity bot
        env:
          GITHUB_EVENT_SCHEDULE: ${{ github.event.schedule }}
        run: |
          ARGS=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force }}" = "true" ]; then
            ARGS="--force"
          elif [ -n "${{ github.event.schedule }}" ]; then
            ARGS="--cron '${{ github.event.schedule }}'"
          fi
          python scripts/activity_bot.py $ARGS
